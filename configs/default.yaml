defaults:
  - dataset: mini_imagenet

training:
  epochs: 100
  lr: 0.1
  weight_decay: 0.0005
  save_dir: "experiments"

task:
  n_way: 5
  n_shot: 1
  n_query: 15
  train_episodes: 100
  val_episodes: 500
  test_episodes: 2000
  fsl_method: "protonet"        # 'protonet' or 'matching'
  distance_metric: "euclidean"  # 'euclidean' or 'cosine'
  use_simpleshot: False         # Set True to enable CL2N

model:
  modality: "graph"             # 'vision', 'graph', or 'fusion'
  hidden_dim: 128
  node_dim: 11
  edge_dim: 14
  gnn_type: "GINE"              # 'GINE', 'GATv2', 'ResGated', 'GPS'
  fusion_type: "concat"         # 'concat', 'add', 'gate'
